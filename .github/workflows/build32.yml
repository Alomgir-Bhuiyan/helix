name: Build Android ARMv7

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: Axlefublr/enable_diagnostics

      - name: Install Rust ARMv7 target
        run: rustup target add armv7-linux-androideabi

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r27c
          add-to-path: true

      - name: Configure cross-compilation
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml << 'EOF'
          [target.armv7-linux-androideabi]
          linker = "armv7a-linux-androideabi35-clang"
          EOF
          echo "CC_armv7_linux_androideabi=armv7a-linux-androideabi35-clang" >> $GITHUB_ENV
          echo "CXX_armv7_linux_androideabi=armv7a-linux-androideabi35-clang++" >> $GITHUB_ENV
          echo "AR_armv7_linux_androideabi=llvm-ar" >> $GITHUB_ENV
          echo "${{ steps.setup-ndk.outputs.ndk-path }}/toolchains/llvm/prebuilt/linux-x86_64/bin" >> $GITHUB_PATH

      - name: Build
        run: cargo build --release --target armv7-linux-androideabi

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: hx-android-armv7
          path: target/armv7-linux-androideabi/release/hx